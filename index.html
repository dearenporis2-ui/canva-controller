<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slide Remote</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #08080f;
      --surface: #0f0f1a;
      --border: #1e1e2e;
      --green: #7cfc5e;
      --red: #ff4455;
      --text: #f0ede8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── SCREEN: JOIN ── */
    #joinScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      gap: 24px;
    }

    .brand {
      text-align: center;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: 32px;
      letter-spacing: -1px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .join-card {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .join-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    .code-input-wrapper {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .digit-box {
      width: 56px;
      height: 64px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: var(--green);
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--green);
    }

    .digit-box:focus {
      border-color: var(--green);
    }

    .join-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      text-transform: uppercase;
    }

    .join-btn:active { transform: scale(0.97); }
    .join-btn:disabled { background: #333; color: #666; }

    .join-error {
      font-size: 11px;
      color: var(--red);
      text-align: center;
      min-height: 16px;
    }

    /* ── SCREEN: REMOTE ── */
    #remoteScreen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .remote-header {
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .remote-header .brand-name {
      font-size: 18px;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s infinite;
    }

    .conn-dot.off { background: var(--red); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .room-badge {
      font-size: 11px;
      color: var(--muted);
      padding: 6px 12px;
      background: var(--surface);
      border-radius: 20px;
      cursor: pointer;
    }

    .room-badge span { color: var(--green); font-weight: 700; }

    /* Main control area */
    .control-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 20px;
    }

    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.1s;
      user-select: none;
      -webkit-user-select: none;
      min-height: 160px;
    }

    .nav-btn:active {
      transform: scale(0.96);
      background: #15151f;
      border-color: var(--green);
    }

    .nav-btn svg {
      width: 48px;
      height: 48px;
      stroke: var(--green);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-btn-label {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Goto slide */
    .goto-section {
      display: flex;
      gap: 10px;
    }

    .goto-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    .goto-input:focus { border-color: var(--green); }
    .goto-input::placeholder { color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; font-weight: 400; }

    .goto-btn {
      padding: 14px 20px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.1s;
    }

    .goto-btn:active { transform: scale(0.95); }

    /* Flash feedback */
    .flash {
      position: fixed;
      inset: 0;
      background: var(--green);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
      z-index: 999;
    }

    .flash.show { opacity: 0.08; }

    /* Disconnect bottom */
    .disconnect-row {
      padding: 12px 20px 24px;
      text-align: center;
    }

    .disconnect-btn {
      background: none;
      border: 1px solid #333;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .disconnect-btn:active { color: var(--red); border-color: var(--red); }
  </style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="brand">
    <div class="brand-name">Slide Remote</div>
    <div class="brand-sub">Phone Controller</div>
  </div>

  <div class="join-card">
    <div class="join-label">Enter Room Code</div>
    <div class="code-input-wrapper">
      <input class="digit-box" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1">
      <input class="digit-box" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2">
      <input class="digit-box" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3">
      <input class="digit-box" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4">
    </div>
    <button class="join-btn" id="joinBtn" disabled>Connect</button>
    <div class="join-error" id="joinError"></div>
  </div>
</div>

<!-- REMOTE SCREEN -->
<div id="remoteScreen">
  <div class="remote-header">
    <div class="brand-name">Slide Remote</div>
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Connected</span>
    </div>
  </div>

  <div class="control-area">
    <div class="nav-buttons">
      <!-- PREV -->
      <button class="nav-btn" id="prevBtn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="nav-btn-label">Previous</span>
      </button>

      <!-- NEXT -->
      <button class="nav-btn" id="nextBtn">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        <span class="nav-btn-label">Next</span>
      </button>
    </div>

    <div class="goto-section">
      <input class="goto-input" type="number" inputmode="numeric" placeholder="Go to slide #" id="gotoInput" min="1">
      <button class="goto-btn" id="gotoBtn">Go</button>
    </div>
  </div>

  <div class="disconnect-row">
    <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
  </div>
</div>

<script>
  // !! Replace this with your Ably API key from https://ably.com (free account)
  const ABLY_API_KEY = "HtCWNA.nyttHg:Zq7f8ZfaTm-7zrzR_CoqWKPVIRiBNb43r2h6nE1IObo";

  const joinScreen = document.getElementById("joinScreen");
  const remoteScreen = document.getElementById("remoteScreen");
  const joinBtn = document.getElementById("joinBtn");
  const joinError = document.getElementById("joinError");
  const connDot = document.getElementById("connDot");
  const connLabel = document.getElementById("connLabel");
  const flash = document.getElementById("flash");

  const digits = [
    document.getElementById("d1"),
    document.getElementById("d2"),
    document.getElementById("d3"),
    document.getElementById("d4")
  ];

  let roomCode = null;
  let pollInterval = null;
  let lastSerial = null;
  let connected = false;

  digits.forEach((box, i) => {
    box.addEventListener("input", (e) => {
      const val = e.target.value.replace(/\D/g, "");
      e.target.value = val.slice(-1);
      if (val && i < 3) digits[i + 1].focus();
      checkCode();
    });
    box.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !box.value && i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = "";
        checkCode();
      }
    });
  });

  function checkCode() {
    joinBtn.disabled = digits.map(d => d.value).join("").length < 4;
  }

  joinBtn.addEventListener("click", () => {
    const code = digits.map(d => d.value).join("");
    if (code.length === 4) connect(code);
  });

  function chName(code) { return `slideremote-${code}`; }

  async function ablyGet(code, fromSerial) {
    const ch = encodeURIComponent(chName(code));
    const url = fromSerial
      ? `https://rest.ably.io/channels/${ch}/messages?limit=10&fromSerial=${encodeURIComponent(fromSerial)}&direction=forwards`
      : `https://rest.ably.io/channels/${ch}/messages?limit=3&direction=backwards`;
    const res = await fetch(url, { headers: { "Authorization": "Basic " + btoa(ABLY_API_KEY) } });
    if (!res.ok) return [];
    return await res.json();
  }

  async function ablyPost(code, data) {
    const ch = encodeURIComponent(chName(code));
    await fetch(`https://rest.ably.io/channels/${ch}/messages`, {
      method: "POST",
      headers: { "Authorization": "Basic " + btoa(ABLY_API_KEY), "Content-Type": "application/json" },
      body: JSON.stringify({ data: JSON.stringify(data) })
    });
  }

  async function connect(code) {
    roomCode = code;
    joinBtn.disabled = true;
    joinBtn.textContent = "Connecting...";
    joinError.textContent = "";

    try {
      const msgs = await ablyGet(code, null);
      lastSerial = msgs.length > 0 ? (msgs[0].serial || msgs[0].id) : null;
    } catch (e) {
      joinError.textContent = "Connection error. Check your internet.";
      joinBtn.disabled = false;
      joinBtn.textContent = "Connect";
      return;
    }

    await ablyPost(code, { type: "phone-hello" });

    const start = Date.now();
    const shake = setInterval(async () => {
      try {
        const msgs = await ablyGet(code, lastSerial);
        for (const msg of msgs) {
          lastSerial = msg.serial || msg.id;
          const data = typeof msg.data === "string" ? JSON.parse(msg.data) : msg.data;
          if (data.type === "pc-ack" || data.type === "pc-online") {
            clearInterval(shake);
            showRemote(code);
            return;
          }
        }
      } catch (e) {}
      if (Date.now() - start > 7000) {
        clearInterval(shake);
        joinError.textContent = "No PC found with that code. Is the extension running?";
        joinBtn.disabled = false;
        joinBtn.textContent = "Connect";
      }
    }, 700);
  }

  function showRemote(code) {
    joinScreen.style.display = "none";
    remoteScreen.style.display = "flex";
    connected = true;
    setConnStatus(true);
    pollInterval = setInterval(async () => {
      try {
        const msgs = await ablyGet(code, lastSerial);
        for (const msg of msgs) lastSerial = msg.serial || msg.id;
      } catch (e) { setConnStatus(false); }
    }, 900);
  }

  function setConnStatus(ok) {
    connDot.className = ok ? "conn-dot" : "conn-dot off";
    connLabel.textContent = ok ? "Connected" : "Disconnected";
  }

  async function sendCommand(action, slideNumber) {
    if (!connected || !roomCode) return;
    await ablyPost(roomCode, { type: "command", action, slideNumber });
    triggerFlash();
  }

  function triggerFlash() {
    flash.classList.add("show");
    setTimeout(() => flash.classList.remove("show"), 100);
  }

  document.getElementById("prevBtn").addEventListener("click", () => sendCommand("prev"));
  document.getElementById("nextBtn").addEventListener("click", () => sendCommand("next"));
  document.getElementById("gotoBtn").addEventListener("click", () => {
    const val = parseInt(document.getElementById("gotoInput").value);
    if (val > 0) { sendCommand("goto", val); document.getElementById("gotoInput").value = ""; }
  });
  document.getElementById("gotoInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("gotoBtn").click();
  });
  document.getElementById("disconnectBtn").addEventListener("click", () => {
    clearInterval(pollInterval); pollInterval = null;
    connected = false; roomCode = null; lastSerial = null;
    remoteScreen.style.display = "none";
    joinScreen.style.display = "flex";
    joinBtn.textContent = "Connect"; joinBtn.disabled = false;
    digits.forEach(d => d.value = ""); digits[0].focus();
  });
</script>
</body>
</html>
